<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Books — PageTurn Publishing</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ============ HEADER ============ -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">PageTurn <span>Publishing</span></a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="books.html" class="nav-link active">Books</a>
        <a href="cart.html" class="nav-link cart-nav-link">
          Cart <span class="cart-badge" id="cartBadge" style="display:none">0</span>
        </a>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">&#9776;</button>
    </div>
    <div class="mobile-nav" id="mobileNav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="books.html" class="nav-link">Books</a>
      <a href="cart.html" class="nav-link">Cart</a>
    </div>
  </header>

  <!-- ============ PAGE HERO ============ -->
  <section class="page-hero">
    <div class="container">
      <h1 class="page-title">All Books</h1>
      <p class="page-subtitle">Browse our full collection and order in seconds via WhatsApp.</p>
    </div>
  </section>

  <!-- ============ BOOKS GRID ============ -->
  <section class="section">
    <div class="container">

      <!-- Search -->
      <div class="books-search-wrap">
        <input
          type="search"
          id="bookSearch"
          class="books-search-input"
          placeholder="Search by title or author…"
          autocomplete="off"
        />
        <span class="books-result-count" id="booksResultCount"></span>
      </div>

      <!-- Grid -->
      <div class="books-grid" id="allBooksGrid"></div>

      <!-- Empty state -->
      <p class="books-empty-msg" id="booksEmptyMsg" style="display:none">
        No books found. Try a different search.
      </p>

      <!-- Load More -->
      <div class="load-more-wrap">
        <button class="btn btn-outline" id="loadMoreBtn" style="display:none">
          Load More
        </button>
      </div>

    </div>
  </section>

  <!-- ============ FOOTER ============ -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <p class="footer-logo">PageTurn Publishing</p>
      <p class="footer-copy">&copy; 2026 PageTurn Publishing. All rights reserved.</p>
    </div>
  </footer>

  <script src="app.js"></script>
  <script>
    setupBooksPage('bookSearch', 'allBooksGrid', 'loadMoreBtn', 'booksEmptyMsg', 'booksResultCount');
  </script>
</body>
</html>
