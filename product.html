<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Details — PageTurn Publishing</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ============ HEADER ============ -->
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">PageTurn <span>Publishing</span></a>
      <nav class="nav">
        <a href="index.html" class="nav-link">Home</a>
        <a href="books.html" class="nav-link active">Books</a>
        <a href="cart.html" class="nav-link cart-nav-link">
          Cart <span class="cart-badge" id="cartBadge" style="display:none">0</span>
        </a>
        <a href="cart.html" class="nav-link nav-cart-mobile" aria-label="Cart">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="cart-badge" id="cartBadgeMobile" style="display:none">0</span>
        </a>
      </nav>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">&#9776;</button>
    </div>
    <div class="mobile-nav" id="mobileNav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="books.html" class="nav-link">Books</a>
      <!-- <a href="cart.html" class="nav-link">Cart</a> -->
    </div>
  </header>

  <!-- ============ PRODUCT PAGE ============ -->
  <section class="section product-section">
    <div class="container">
      <a href="books.html" class="back-link">← Back to Books</a>
      <div class="product-layout" id="productLayout">
        <!-- Injected by JS -->
      </div>
    </div>
  </section>

  <!-- ============ RELATED SECTION ============ -->
  <section class="section related-section">
    <div class="container">
      <div class="section-header">
        <h2 class="section-title">You Might Also Like</h2>
        <a href="books.html" class="section-link">View all →</a>
      </div>
      <div class="books-grid" id="relatedGrid">
        <!-- Injected by JS -->
      </div>
    </div>
  </section>

  <!-- ============ FOOTER ============ -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <p class="footer-logo">PageTurn Publishing</p>
      <p class="footer-copy">&copy; 2026 PageTurn Publishing. All rights reserved.</p>
    </div>
  </footer>

  <script src="app.js"></script>
  <script>
    (async () => {
      const allBooks = await fetchBooks();

      // Get book id from URL: product.html?id=1
      const params = new URLSearchParams(window.location.search);
      const bookId = parseInt(params.get('id')) || 1;
      const book   = allBooks.find(b => b.id === bookId) || allBooks[0];

      if (!book) return; // JSON failed to load — nothing to render

      // Update page title
      document.title = book.title + ' — PageTurn Publishing';

      // Render product detail
      const layout = document.getElementById('productLayout');
      layout.innerHTML = `
        <div class="product-image-wrap">
          <div class="product-cover" style="background:${book.color}">
            <span class="product-cover-title">${book.title}</span>
            <span class="product-cover-author">${book.author}</span>
          </div>
        </div>
        <div class="product-details">
          <p class="product-genre">${book.genre}</p>
          <h1 class="product-title">${book.title}</h1>
          <p class="product-author">by ${book.author}</p>
          <p class="product-price">$${book.price.toFixed(2)}</p>
          <p class="product-description">${book.description}</p>
          <div class="product-btn-row">
            <button class="btn btn-primary btn-large" onclick="addToCart(${book.id}); updateCartBadge();">
              + Add to Cart
            </button>
            <a href="https://wa.me/1234567890?text=Hi%2C%20I%20want%20to%20order%3A%20${encodeURIComponent(book.title)}"
               target="_blank" class="btn btn-outline btn-large">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.556 4.117 1.528 5.844L.057 23.886l6.198-1.444A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.847 0-3.577-.485-5.083-1.333l-.364-.216-3.678.856.896-3.565-.237-.38A9.956 9.956 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
              Order Now
            </a>
          </div>
          <p class="product-note">Or <a href="cart.html" style="color:var(--color-accent)">view your cart</a> to order multiple books at once.</p>
        </div>
      `;

      // Render related books (exclude current, max 3)
      const related = allBooks.filter(b => b.id !== bookId).slice(0, 3);
      renderBooks('relatedGrid', related);
    })();
  </script>
</body>
</html>
